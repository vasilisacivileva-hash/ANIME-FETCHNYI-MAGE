<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="source/styles/mycss.css">
  <link rel="apple-touch-icon" sizes="180x180" href="source/files/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="source/files/favicon_io/favicon-32x32.png">
  <title>Корзина | ANIME FETCHNYI MAGE</title>
  <style>
    .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; }
    .cart-table th, .cart-table td { vertical-align: middle; text-align: center; }
    .quantity-input { width: 70px; text-align: center; }
    .empty-cart { text-align: center; padding: 3rem; background: rgba(255,255,255,0.1); border-radius: 24px; }
  </style>
</head>
<body>

<header>
  <nav class="navbar navbar-expand-lg bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><img src="source/files/Лого.png" alt="Лого"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
          <li class="nav-item"><a class="nav-link" href="pricing.html">Товары</a></li>
           <li class="nav-item"><a class="nav-link active" href="cart.html">Корзина</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">О нас</a></li>
          <li class="nav-item"><a class="nav-link" href="pricing.html">Контакты</a></li>
          <li class="nav-item"><a class="nav-link" href="#"><img style="width: 45px;" src="source/files/79a0912a89eba223ff004ecd10778489 (1).png" alt="..."></a></li>
          <li class="nav-item"><a class="nav-link" href="#"><img style="width: 30px;" src="source/files/Telegram_2019_Logo.svg.png" alt="..."></a></li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<section>
  <div class="container-fluid m-4">
    <div class="row">
      <div class="col-lg-1"></div>
      <div class="col-lg-10 col-md-12">
        <h1 class="text-white mb-4">🛒 Ваша корзина</h1>
        <div id="cart-container"></div>
      </div>
      <div class="col-lg-1"></div>
    </div>
  </div>
</section>

<footer class="mt-4">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-4 col-md-12 footer-text text-center"><p>Все права защищены 2026</p></div>
      <div class="col-lg-4 col-md-12 footer-text text-center"><p>Контакты <br>Работа<br>Наша команда</p></div>
      <div class="col-lg-4 col-md-12 media-links">
        <img style="width: 50px; margin-inline: 1em;" src="source/files/79a0912a89eba223ff004ecd10778489 (1).png" alt="...">
        <img style="width: 40px; margin-inline: 1em;" src="source/files/Telegram_2019_Logo.svg.png" alt="...">
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ========== РАБОТА С КОРЗИНОЙ ==========
  function getCart() {
    return JSON.parse(localStorage.getItem('cart')) || [];
  }
  function saveCart(cart) {
    localStorage.setItem('cart', JSON.stringify(cart));
  }

  // Удаление товара по id (строка/число)
  function removeFromCart(id) {
    let cart = getCart();
    // сравниваем как строки, чтобы не зависеть от типа
    cart = cart.filter(item => String(item.id) !== String(id));
    saveCart(cart);
    renderCart();
  }

  // Изменение количества
  function updateQuantity(id, newQuantity) {
    let cart = getCart();
    const item = cart.find(item => String(item.id) === String(id));
    if (item) {
      let qty = parseInt(newQuantity);
      if (isNaN(qty) || qty < 1) qty = 1;
      item.quantity = qty;
      saveCart(cart);
      renderCart();
    }
  }

  // Очистка корзины (для кнопки "Оформить")
  function clearCart() {
    localStorage.removeItem('cart');
    renderCart();
  }

  // Отрисовка корзины
  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cart-container');
    if (cart.length === 0) {
      container.innerHTML = `<div class="empty-cart text-white">
        <h3>Корзина пуста 😢</h3>
        <p>Перейдите в <a href="pricing.html" class="text-warning">каталог</a>, чтобы добавить товары.</p>
      </div>`;
      return;
    }

    let html = `<div class="table-responsive">
      <table class="table table-dark table-hover cart-table align-middle">
        <thead>
          <tr><th>Изображение</th><th>Название</th><th>Цена</th><th>Количество</th><th>Сумма</th><th>Действие</th></tr>
        </thead>
        <tbody>`;
    let total = 0;
    for (let item of cart) {
      const sum = item.price * item.quantity;
      total += sum;
      html += `
        <tr data-id="${item.id}">
          <td><img src="${item.img}" class="cart-item-img" onerror="this.src='source/images/Другое.jpg'"></td>
          <td>${item.name}</td>
          <td>${item.price} ₽</td>
          <td><input type="number" min="1" value="${item.quantity}" class="form-control quantity-input" data-id="${item.id}" style="width:80px; margin:0 auto;"></td>
          <td class="item-sum">${sum} ₽</td>
          <td><button class="btn btn-danger btn-sm remove-item" data-id="${item.id}">Удалить</button></td>
        </tr>
      `;
    }
    html += `
        </tbody>
        <tfoot>
          <tr class="table-active"><td colspan="4" class="text-end fw-bold">Итого:</td><td class="fw-bold total-display">${total} ₽</td><td></td></tr>
        </tfoot>
      </table>
    </div>
    <div class="text-end mt-3">
      <button class="btn btn-success btn-lg" id="checkout-btn">Оформить заказ 🎉</button>
      <a href="pricing.html" class="btn btn-outline-light btn-lg ms-2">Продолжить покупки</a>
    </div>`;
    container.innerHTML = html;
  }

  // ========== ОБРАБОТЧИКИ СОБЫТИЙ (делегирование) ==========
  // Вешаем обработчики на родительский контейнер, чтобы они работали даже после перерисовки
  document.getElementById('cart-container').addEventListener('click', (e) => {
    // Кнопка "Удалить"
    if (e.target.classList.contains('remove-item')) {
      const id = e.target.getAttribute('data-id');
      removeFromCart(id);
    }
    // Кнопка "Оформить заказ" (если она уже есть в DOM)
    if (e.target.id === 'checkout-btn') {
      alert('Спасибо за заказ! Наш менеджер свяжется с вами.\n(Демо-режим)');
      clearCart();
    }
  });

  // Изменение количества (событие change)
  document.getElementById('cart-container').addEventListener('change', (e) => {
    if (e.target.classList.contains('quantity-input')) {
      const id = e.target.getAttribute('data-id');
      const newQty = parseInt(e.target.value);
      if (!isNaN(newQty)) {
        updateQuantity(id, newQty);
      }
    }
  });

  // Первоначальная отрисовка
  renderCart();
</script>
</body>
</html>
